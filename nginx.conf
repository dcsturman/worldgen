events {}
http {
    include /etc/nginx/mime.types;
    # Override wasm MIME type to ensure it's set correctly
    types {
        application/wasm wasm;
    }
    default_type application/octet-stream;

    # On-the-fly compression for the wasm bundle and other text assets.
    # The wasm response is the dominant payload (multi-MB) and gzips by
    # ~3-4×, which both speeds up first paint and stays well under
    # Cloud Run's 32 MiB per-response cap (the cap is on wire size).
    # comp_level 6 is the standard balance — going higher saves a few
    # percent at noticeably more CPU on each cold-cache request.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/wasm
        application/javascript
        application/json
        text/css
        text/html
        text/plain
        image/svg+xml;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # WebSocket proxy to the trade state server
        location /ws/trade {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket proxy to the ship simulator server
        location /ws/simulator {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket proxy to the captain's-log AI server
        location /ws/captains-log {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # HTTP proxy to all worldgen JSON/image API routes (currently
        # /api/system and /api/world; see src/backend/http_server.rs).
        # The whole namespace lives under /api/ so prefix-matching can
        # never collide with the SPA's path-based routes
        # (/world, /worldmap, /trade, /simulator, /). Plain HTTP, no
        # Upgrade headers; buffering left on for the PNG bodies.
        #
        # proxy_read_timeout 120 covers the cold /api/world render
        # (~25 s) — /api/system at the default scale finishes well
        # under nginx's normal 60 s default.
        location /api/ {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            proxy_send_timeout 120;
            proxy_connect_timeout 10;
        }

        # Content-hash-fingerprinted assets are immutable: Trunk bakes a
        # 16-hex-char hash into the filename (e.g.
        # main-1ff64f94dd0f6bdd_bg.wasm, bootstrap.min-<hash>.css), so the
        # URL changes whenever the bytes change. Cache them for a year and
        # mark immutable so browsers (and any future CDN) never revalidate.
        # This is the big win — the wasm bundle alone is ~37 MB. Only the
        # hashed names match here; unhashed copies (galaxy1.png, modal.css)
        # fall through to `location /` and keep default revalidation.
        location ~ "-[0-9a-f]{16}.*\.(wasm|js|css)$" {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Try to serve the requested file, if not found serve index.html.
        # The SPA shell (index.html) references the hashed asset names above,
        # so it must NOT be cached long — `no-cache` makes browsers
        # revalidate it on every load (cheap 304 when unchanged) so a new
        # deploy's bundle is picked up immediately.
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
}
