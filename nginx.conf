events {}
http {
    include /etc/nginx/mime.types;
    # Override wasm MIME type to ensure it's set correctly
    types {
        application/wasm wasm;
    }
    default_type application/octet-stream;

    # On-the-fly compression for the wasm bundle and other text assets.
    # The wasm response is the dominant payload (multi-MB) and gzips by
    # ~3-4×, which both speeds up first paint and stays well under
    # Cloud Run's 32 MiB per-response cap (the cap is on wire size).
    # comp_level 6 is the standard balance — going higher saves a few
    # percent at noticeably more CPU on each cold-cache request.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/wasm
        application/javascript
        application/json
        text/css
        text/html
        text/plain
        image/svg+xml;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # WebSocket proxy to the trade state server
        location /ws/trade {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket proxy to the ship simulator server
        location /ws/simulator {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket proxy to the captain's-log AI server
        location /ws/captains-log {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # HTTP proxy to the worldgen system-image API
        # (see src/backend/http_server.rs). Same backend, plain HTTP
        # rather than WebSocket, so no Upgrade/Connection headers. The
        # PNG bodies can run into the hundreds of KB at scale=2.0, so
        # we let the buffers do their thing rather than disabling
        # buffering as we do for the streaming WS endpoints.
        location /system {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
            proxy_send_timeout 60;
            proxy_connect_timeout 10;
        }

        # HTTP proxy to the worldgen planet-surface API.
        # Cold-cache renders take ~25 s, so the read timeout is bumped
        # past nginx's default 60 s. Cache hits return in ~200 ms
        # (decode + downsample + encode). The backend writes through
        # to GCS on miss so subsequent calls don't pay the cost again.
        location /world {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            proxy_send_timeout 120;
            proxy_connect_timeout 10;
        }

        # Try to serve the requested file, if not found serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
